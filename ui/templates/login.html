<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Product Integrity Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #f5f5f0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d9d8d2;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07), 0 1px 3px rgba(0, 0, 0, 0.05);
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
      border: 1px solid #4f46e5;
      transition: background 0.18s, border-color 0.18s;
    }

    .btn-primary:hover {
      background: #3730a3;
      border-color: #3730a3;
    }

    .input-field {
      background: #fff;
      border: 1px solid #d9d8d2;
      color: #1a1a1a;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .input-field:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .input-field::placeholder {
      color: #aaa;
    }

    .logo-icon {
      background: #4f46e5;
    }
  </style>
</head>

<body class="flex flex-col min-h-screen">
  <div class="flex-1 flex items-center justify-center">
  <div class="card rounded-2xl p-10 w-full max-w-md">

    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <div class="logo-icon inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold" style="color: #1a1a1a;">Product Integrity Checker</h1>
      <p class="text-sm mt-1" style="color: #6b6b6b;">Enter your password to continue</p>
    </div>

    <!-- Error message -->
    {% if error %}
    <div class="mb-5 flex items-center gap-2 rounded-lg px-4 py-3 text-sm"
      style="background:#fef2f2; border:1px solid #fecaca; color:#b91c1c;">
      <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
          clip-rule="evenodd" />
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- Login form -->
    <form method="POST" action="/login">
      <div class="mb-6">
        <label class="block text-sm font-semibold mb-2"
          style="color:#6b6b6b; letter-spacing:0.03em; text-transform:uppercase;" for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter your password"
          class="input-field w-full px-4 py-3 rounded-xl text-sm" autofocus required />
      </div>
      <button type="submit" class="btn-primary w-full py-3 rounded-xl font-semibold text-sm tracking-wide">
        Sign In
      </button>
    </form>
  </div>
  </div>
  {% include 'footer.html' %}
</body>

</html>
